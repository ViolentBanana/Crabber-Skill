<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crabber Share</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        crabber: '#FF5722',
                        'crabber-dark': '#E64A19',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar for dark mode */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937; 
        }
        ::-webkit-scrollbar-thumb {
            background: #374151; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4b5563; 
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="flex justify-between items-center px-6 py-4 border-b border-gray-800 bg-gray-900/80 backdrop-blur-md sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-crabber rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-[0_0_15px_rgba(255,87,34,0.4)]">
                🦀
            </div>
            <h1 class="text-xl font-bold tracking-tight">Crabber</h1>
        </div>
        <div class="text-sm font-medium text-gray-400 bg-gray-800 px-3 py-1.5 rounded-full border border-gray-700">
             来自 Mac mini 的投递
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center p-6 md:p-12">
        <div class="w-full max-w-4xl" id="content-container">
            <!-- Loading state -->
            <div id="loading" class="flex flex-col items-center justify-center py-20 animate-pulse">
                <div class="w-12 h-12 border-4 border-gray-700 border-t-crabber rounded-full animate-spin mb-4"></div>
                <p class="text-gray-400">正在寻找新鲜出炉的文件...</p>
            </div>
            
            <!-- Empty state -->
            <div id="empty-state" class="hidden flex-col items-center justify-center py-20 text-center">
                <div class="text-6xl mb-6 opacity-50">📭</div>
                <h2 class="text-2xl font-semibold mb-2">暂无可用文件</h2>
                <p class="text-gray-400 max-w-md">当前没有需要投递的文件。AI Agent 生成的文件将会在这里出现，页面会自动刷新。</p>
            </div>

            <!-- File List -->
            <div id="file-list" class="hidden flex flex-col gap-4">
                <!-- File cards will be injected here -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-6 text-center text-gray-500 text-sm border-t border-gray-800">
        <p>Generated by <span class="text-gray-400 font-medium">Hermes</span> & <span class="text-gray-400 font-medium">OpenClaw</span></p>
    </footer>

    <!-- Template for a file card -->
    <template id="file-card-template">
        <div class="group bg-gray-800 border border-gray-700 hover:border-crabber/50 rounded-2xl p-6 transition-all duration-300 hover:shadow-[0_8px_30px_rgba(0,0,0,0.3)] hover:-translate-y-1">
            <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6">
                <div class="flex items-center gap-5 overflow-hidden">
                    <div class="file-icon w-16 h-16 rounded-xl bg-gray-700 flex items-center justify-center text-3xl shrink-0">
                        📄
                    </div>
                    <div class="min-w-0">
                        <h3 class="file-name text-lg font-semibold text-white truncate mb-1" title="">Filename</h3>
                        <div class="flex items-center gap-3 text-sm text-gray-400">
                            <span class="file-size bg-gray-900 px-2 py-0.5 rounded-md">Size</span>
                            <span>•</span>
                            <span class="file-time">Time</span>
                        </div>
                    </div>
                </div>
                <a href="#" class="file-download-btn shrink-0 w-full sm:w-auto bg-crabber hover:bg-crabber-dark text-white px-6 py-3 rounded-xl font-medium transition-colors flex items-center justify-center gap-2 shadow-lg shadow-crabber/20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    点击下载
                </a>
            </div>
        </div>
    </template>

    <script>
        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB', 'PB', 'EB', 'ZB', 'YB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const iconMap = {
                'pdf': '📕',
                'ppt': '🪧',
                'pptx': '🪧',
                'doc': '📘',
                'docx': '📘',
                'xls': '📗',
                'xlsx': '📗',
                'zip': '🗜️',
                'tar': '🗜️',
                'gz': '🗜️',
                'png': '🖼️',
                'jpg': '🖼️',
                'jpeg': '🖼️',
                'gif': '🖼️',
                'mp4': '🎬',
                'mp3': '🎵',
                'txt': '📝',
                'md': '📝',
                'py': '🐍',
                'js': '🟨',
                'json': '{}'
            };
            return iconMap[ext] || '📄';
        }

        async function fetchFiles() {
            try {
                const response = await fetch('/api/files');
                const data = await response.json();
                renderFiles(data.files);
            } catch (error) {
                console.error('Error fetching files:', error);
            }
        }

        function renderFiles(files) {
            const loadingEl = document.getElementById('loading');
            const emptyEl = document.getElementById('empty-state');
            const listEl = document.getElementById('file-list');
            const template = document.getElementById('file-card-template');

            loadingEl.classList.add('hidden');

            if (!files || files.length === 0) {
                emptyEl.classList.remove('hidden');
                emptyEl.classList.add('flex');
                listEl.classList.add('hidden');
                return;
            }

            emptyEl.classList.add('hidden');
            emptyEl.classList.remove('flex');
            listEl.classList.remove('hidden');
            
            // Sort files by created_at descending
            files.sort((a, b) => b.created_at - a.created_at);

            listEl.innerHTML = '';
            files.forEach(file => {
                const clone = template.content.cloneNode(true);
                
                clone.querySelector('.file-name').textContent = file.name;
                clone.querySelector('.file-name').title = file.name;
                clone.querySelector('.file-size').textContent = formatBytes(file.size);
                clone.querySelector('.file-time').textContent = formatTime(file.created_at);
                clone.querySelector('.file-icon').textContent = getFileIcon(file.name);
                clone.querySelector('.file-download-btn').href = `/download/${file.id}`;
                
                listEl.appendChild(clone);
            });
        }

        // Initial fetch
        fetchFiles();

        // Polling every 5 seconds
        setInterval(fetchFiles, 5000);
    </script>
</body>
</html>
